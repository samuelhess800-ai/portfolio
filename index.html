<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel David Hess | Portfolio</title>
    <style>
        :root {
            --primary-color: #2e5a44; /* Elegantes Tannengrün */
            --text-color: #2c3e50;
            --light-bg: #f8f9fa;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #ffffff;
        }

        header {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: #1a1a1a;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-top: 0;
            font-weight: 400;
        }

        .section-title {
            font-size: 1.8rem;
            color: #1a1a1a;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
        }

        .project-description {
            max-width: 700px;
            margin: 0 auto 40px auto;
            text-align: center;
            font-size: 1.1rem;
            color: #555;
        }

        /* Timeline-Styling für den Lebenslauf */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto 50px auto;
            padding: 10px 0;
        }

        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background-color: var(--border-color);
            top: 0;
            bottom: 0;
            left: 20px;
        }

        .timeline-item {
            padding: 10px 30px;
            position: relative;
            background-color: inherit;
            width: 100%;
            box-sizing: border-box;
            margin-left: 10px;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            left: 4px;
            background-color: white;
            border: 3px solid var(--primary-color);
            top: 15px;
            border-radius: 50%;
            z-index: 1;
        }

        .timeline-content {
            padding: 15px 20px;
            background-color: var(--light-bg);
            position: relative;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .timeline-content h4 {
            margin: 0 0 5px 0;
            color: #1a1a1a;
            font-size: 1.1rem;
        }

        .timeline-content p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
        }

        .plan-section {
            margin-bottom: 60px;
        }

        .plan-header {
            margin-bottom: 15px;
        }

        .plan-header h3 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: #1a1a1a;
        }

        .plan-header p {
            font-style: italic;
            color: #666;
            margin-top: 0;
            font-size: 0.95rem;
        }

        .image-container {
            background-color: var(--light-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s ease;
        }

        .image-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 5px 0;
        }

        .links-section {
            background-color: var(--light-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
